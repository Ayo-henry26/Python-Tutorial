<html>
    <head>
        <meta charset="utf-8"/>
        <title>Music Player</title>
    </head>
    <body>
        <div class="music-player"></div>
        {% for item in page_obj %}
            <div class="cover">
                <img src="{{item.image.url}}">
            </div>

            <div class="titre">
                <h3>{{item.artist}}</h3>
                <h1>{{item.title}}</h1>
            </div>

            <center>
                <a href="{% if page_obj.has_previous %}?page={{page_obj.previous_page_number}}{% endif %}">
                    <i class="fa fa-step-backward fa-2x"></i>
                </a>
                &nbsp; &nbsp; &nbsp;
                <a href="{% if page_obj.has_next %}?page={{page_obj.next_page_number}}{% endif %}">
                    <i class="fa fa-step-forward fa-2x"></i>
                </a>
            </center>


            <div class="lecteur">
                <audio id="fc-media" class="fc-media" style="width: 100%;">
                    <source src="{% if item.audio_files %}{{item.audio_file.url}}{% else %} {{item.audio_link}} {% endif %}" type="audio/mpeg">
                </audio>
            </div>

        {% endfor %}
    </body>
</html>
